site_name: sqlalchemy-pytibero
site_description: SQLAlchemy 2.0 dialect for the Tibero database
site_url: https://yeongseon.github.io/sqlalchemy-pytibero/
repo_url: https://github.com/yeongseon/sqlalchemy-pytibero
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

nav:
  - Home: index.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite

plugins:
  - search

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/sqlalchemy-pytibero
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/sqlalchemy-pytibero/

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-init.js
