name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check sqlalchemy_pytibero/ test/
      - name: Ruff format check
        run: ruff format --check sqlalchemy_pytibero/ test/

  offline-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run offline tests with coverage
        run: |
          python -m pytest \
            test/ \
            --ignore=test/oracle_compat \
            -v --tb=short \
            --cov=sqlalchemy_pytibero \
            --cov-report=term-missing \
            --cov-fail-under=95
